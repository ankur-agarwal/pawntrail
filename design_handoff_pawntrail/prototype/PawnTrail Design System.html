<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PawnTrail — Design System</title>
<link rel="icon" type="image/png" href="assets/trail-favicon-256.png" />
<link rel="stylesheet" href="tokens.css" />
<style>
  /* Page-level chrome only — components own their styles */
  html, body, #root { height: 100%; }
  #root { background: var(--pt-bg); }

  .ds-section-header {
    display: flex; align-items: baseline; justify-content: space-between;
    padding: 8px 12px 12px;
    border-bottom: 0.5px dashed var(--pt-border);
    margin-bottom: 16px;
  }
  .ds-section-header .pt-display { color: var(--pt-text); }
  .ds-section-header .pt-micro { color: var(--pt-text-dim); }
  .ds-grid { display: grid; gap: 20px; padding: 8px 12px 32px; }
  .ds-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
  .ds-stack { display: flex; flex-direction: column; gap: 12px; }
  .ds-spec-row { display: flex; align-items: baseline; gap: 16px; padding: 8px 0; border-bottom: 0.5px dashed var(--pt-border); }
  .ds-spec-row:last-child { border-bottom: 0; }
  .ds-spec-key { width: 110px; flex-shrink: 0; }

  /* dotted overlay decoration for swatches */
  .ds-swatch {
    position: relative;
    border: 0.5px solid var(--pt-border-strong);
    border-radius: var(--pt-r-card);
    overflow: hidden;
  }
  .ds-swatch-meta {
    padding: 10px 12px;
    background: var(--pt-surface);
    border-top: 0.5px solid var(--pt-border);
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="brand.jsx"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="layouts.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
